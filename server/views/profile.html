<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Eventix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0a0a;--bg2:#111;--fg:#f0ede8;--muted:#555;--muted2:#888;--red:#c8392b;--border:rgba(255,255,255,.07);--font-sans:'Inter',sans-serif;--font-display:'Syne',sans-serif;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);min-height:100vh;cursor:none;overflow-x:hidden;}
    #cursor{position:fixed;width:10px;height:10px;background:var(--fg);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .2s,height .2s;}
    #cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(240,237,232,.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .15s ease;}
    body::before{content:'';position:fixed;inset:0;z-index:9990;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.3;}

    nav{position:sticky;top:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 5%;background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:var(--font-display);font-size:1.2rem;font-weight:800;letter-spacing:-.02em;color:var(--fg);text-decoration:none;}
    .nav-logo span{color:var(--red);}
    .nav-right{display:flex;align-items:center;gap:1.5rem;}
    .nav-link{font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);text-decoration:none;transition:color .2s;}
    .nav-link:hover{color:var(--fg);}

    .page-header{padding:3rem 5% 2rem;border-bottom:1px solid var(--border);}
    .page-title{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.04em;line-height:.95;}
    .page-sub{font-size:.8rem;color:var(--muted2);margin-top:.4rem;}

    .profile-wrap{max-width:800px;margin:0 auto;padding:3rem 5%;}
    .avatar-section{display:flex;flex-direction:column;align-items:center;margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid var(--border);}
    .avatar-wrap{position:relative;width:96px;height:96px;border-radius:50%;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .2s;}
    .avatar-wrap:hover{border-color:rgba(255,255,255,.25);}
    .avatar-wrap img{width:100%;height:100%;object-fit:cover;}
    .avatar-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:.8rem;}

    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
    .field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem;}
    .field.full{grid-column:1/-1;}
    .field label{font-size:.68rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted2);}
    .field input,.field textarea{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:2px;padding:.75rem 1rem;color:var(--fg);font-size:.9rem;font-family:var(--font-sans);outline:none;transition:border-color .2s;}
    .field input:focus,.field textarea:focus{border-color:rgba(255,255,255,.2);}
    .field input::placeholder,.field textarea::placeholder{color:var(--muted);}
    .field input:read-only{background:rgba(255,255,255,.02);color:var(--muted);cursor:not-allowed;}
    .field textarea{resize:vertical;min-height:80px;}
    .interests-grid{display:flex;flex-wrap:wrap;gap:.6rem;}
    .interest-chip{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--muted2);cursor:pointer;}
    .interest-chip input{accent-color:var(--fg);}
    .radio-row{display:flex;gap:1.5rem;}
    .radio-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:var(--muted2);cursor:pointer;}
    .radio-item input{accent-color:var(--fg);}

    .form-actions{display:flex;gap:1rem;margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border);}
    .btn{font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.7rem 1.8rem;border-radius:2px;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;gap:.4rem;}
    .btn-primary{color:var(--bg);background:var(--fg);border:none;}
    .btn-primary:hover{opacity:.88;}
    .btn-secondary{color:var(--muted2);background:none;border:1px solid var(--border);}
    .btn-secondary:hover{color:var(--fg);border-color:rgba(255,255,255,.2);}

    .danger-zone{margin-top:3rem;padding:2rem;border:1px solid rgba(200,57,43,.2);border-radius:2px;background:rgba(200,57,43,.04);}
    .danger-title{font-family:var(--font-display);font-size:1.2rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.5rem;}
    .danger-sub{font-size:.78rem;color:var(--muted2);margin-bottom:1.2rem;}
    .danger-actions{display:flex;gap:.8rem;flex-wrap:wrap;}
    .btn-danger{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#fca5a5;background:none;border:1px solid rgba(200,57,43,.3);padding:.5rem 1.2rem;border-radius:2px;cursor:pointer;transition:all .2s;}
    .btn-danger:hover{background:rgba(200,57,43,.1);border-color:rgba(200,57,43,.5);}

    /* Bookings Section */
    .bookings-section{margin-top:3rem;padding-top:3rem;border-top:1px solid var(--border);}
    .bookings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
    .bookings-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;letter-spacing:-.03em;}
    .bookings-count{font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);background:rgba(255,255,255,.04);padding:.4rem .8rem;border-radius:2px;}
    .bookings-list{display:grid;gap:1rem;}
    .bookings-loading{padding:2rem;text-align:center;color:var(--muted2);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;}
    .booking-item{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:2px;padding:1.2rem;transition:all .2s;}
    .booking-item:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);}
    .booking-event{font-weight:600;font-size:.95rem;margin-bottom:.4rem;}
    .booking-meta{font-size:.75rem;color:var(--muted2);display:flex;gap:1rem;flex-wrap:wrap;}
    .booking-meta span{display:flex;align-items:center;gap:.3rem;}

    @media(max-width:768px){.form-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <nav>
    <a href="home.html" class="nav-logo">event<span>ix</span></a>
    <div class="nav-right">
      <a href="bookings.html" class="nav-link">My Bookings</a>
      <a href="currevents.html" class="nav-link">Events</a>
      <a href="home.html" class="nav-link">Home</a>
    </div>
  </nav>

  <div class="page-header">
    <h1 class="page-title">Profile Settings</h1>
    <p class="page-sub">Manage your personal information</p>
  </div>

  <div class="profile-wrap">
    <div class="avatar-section">
      <div class="avatar-wrap" id="avatarWrap">
        <img src="" alt="Avatar" id="avatarImg">
      </div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none">
      <div class="avatar-label">Click to change photo</div>
    </div>

    <form id="profileForm">
      <div class="form-grid">
        <div class="field">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Alex Rivera">
        </div>
        <div class="field">
          <label>Email <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(read-only)</span></label>
          <input type="email" id="email" readonly>
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
        </div>
        <div class="field">
          <label>Date of Birth</label>
          <input type="date" id="dob">
        </div>
        <div class="field full">
          <label>Location</label>
          <input type="text" id="location" placeholder="New York, NY">
        </div>
        <div class="field full">
          <label>Bio</label>
          <textarea id="bio" placeholder="Tell us about yourself…"></textarea>
        </div>
        <div class="field full">
          <label>Interests</label>
          <div class="interests-grid">
            <label class="interest-chip"><input type="checkbox" name="interests" value="concerts">Concerts</label>
            <label class="interest-chip"><input type="checkbox" name="interests" value="comedy">Comedy</label>
            <label class="interest-chip"><input type="checkbox" name="interests" value="workshops">Workshops</label>
            <label class="interest-chip"><input type="checkbox" name="interests" value="food">Food</label>
            <label class="interest-chip"><input type="checkbox" name="interests" value="theatre">Theatre</label>
            <label class="interest-chip"><input type="checkbox" name="interests" value="sports">Sports</label>
          </div>
        </div>
        <div class="field full">
          <label>Notifications</label>
          <div class="radio-row">
            <label class="radio-item"><input type="radio" name="notifications" value="all" checked>All</label>
            <label class="radio-item"><input type="radio" name="notifications" value="important">Important</label>
            <label class="radio-item"><input type="radio" name="notifications" value="none">None</label>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
      </div>
    </form>

    <!-- MY BOOKINGS -->
    <div class="bookings-section">
      <div class="bookings-header">
        <h2 class="bookings-title">My Bookings</h2>
        <span class="bookings-count" id="bookingsCount">—</span>
      </div>
      <div id="bookingsList" class="bookings-list">
        <div class="bookings-loading">Loading bookings…</div>
      </div>
    </div>

    <div class="danger-zone">
      <div class="danger-title">Account Management</div>
      <p class="danger-sub">Irreversible actions — proceed with caution</p>
      <div class="danger-actions">
        <button class="btn-danger" id="changePasswordBtn">Change Password</button>
        <button class="btn-danger" id="deactivateBtn">Deactivate Account</button>
      </div>
    </div>
  </div>

  <script src="/profile.js?v=2"></script>
</body>
</html>
