<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings — Eventix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/bookings.css">
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <nav>
    <a href="home.html" class="nav-logo">event<span>ix</span></a>
    <div class="nav-right">
      <a href="currevents.html" class="nav-link">Browse Events</a>
      <a href="profile.html" class="nav-link">Profile</a>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="page-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="page-title">My Bookings</h1>
        <p class="page-sub">View and manage your event reservations</p>
      </div>
    </div>
  </div>

  <div class="bookings-container">
    <section class="bookings-section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="title-icon">🎫</span>
          All Bookings
        </h2>
        <div class="section-actions">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="upcoming">Upcoming</button>
          <button class="filter-btn" data-filter="past">Past</button>
        </div>
      </div>

      <div id="bookingsList" class="bookings-grid">
        <div class="loading-state">
          <div class="loader"></div>
          <p>Loading your bookings...</p>
        </div>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <div class="empty-icon">📭</div>
        <h3>No bookings yet</h3>
        <p>Start exploring events and book your first seat!</p>
        <a href="currevents.html" class="btn-primary">Browse Events</a>
      </div>
    </section>
  </div>

  <div id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/bookings.js?v=2"></script>
</body>
</html>
