<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Eventix</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    
    <canvas id="bg-canvas"></canvas>

    <div class="content-wrapper">
        
        <nav class="navbar">
            <div class="logo">event<span>ix</span><span style="color: white;">.</span></div>
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="currevents.html">Events</a>
                <a href="#">Categories</a>
                <a href="#">Contact</a>
                <a href="signup.html" class="btn-outline">Sign up</a>
            </div>
        </nav>

        
        <section class="signup-section">
            <div class="signup-card">
                <div class="signup-header">
                    <h2>Welcome back</h2>
                    <p>Sign in to your <i class="fas fa-fire" style="color:#e13b2e;"></i> account</p>
                </div>

                <form id="loginForm">
                    
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" placeholder="hello@eventix.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-signup"><i class="fas fa-arrow-right-to-bracket"></i> Sign in</button>

                    <div class="social-signup">
                        <p><span>or sign in with</span></p>
                        <div class="social-icons">
                            <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                            <a href="#" class="social-icon"><i class="fab fa-apple"></i></a>
                            <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                        </div>
                    </div>

                    <p style="text-align:center; margin-top: 2rem; color:#bbb0a9; font-size:0.9rem;">
                        Don't have an account? <a href="signup.html" style="color:#e13b2e; font-weight:600;">Sign up</a>
                    </p>
                </form>
            </div>
        </section>

        
        <div class="newsletter" style="margin-top: 1rem; margin-bottom: 2rem; padding: 2.5rem 6%;">
            <h3 style="font-size: 2rem;">Stay in the loop</h3>
            <p style="font-size: 1rem;">Get exclusive invites & offers</p>
            <div class="newsletter-input" style="max-width: 450px;">
                <input type="email" placeholder="your.email@example.com">
                <button><i class="fas fa-paper-plane"></i> Subscribe</button>
            </div>
        </div>

        
        <footer>
            <p>© 2025 Eventix. All rights reserved. <span style="color:#e13b2e;">Discover the extraordinary</span></p>
        </footer>
    </div>

    
    <script src="login.js"></script>
</body>
</html>
