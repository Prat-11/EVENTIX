<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Eventix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#0f0f0f;--fg:#f2ede7;--muted:#3a3a3a;--muted2:#666;--red:#c0392b;--border:rgba(242,237,231,.06);--font:'Inter',sans-serif;--display:'Syne',sans-serif;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--fg);min-height:100vh;display:flex;cursor:none;overflow:hidden;}
body::after{content:'';position:fixed;inset:-50%;z-index:9991;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");width:200%;height:200%;animation:grain 8s steps(10) infinite;opacity:.3;}
@keyframes grain{0%,100%{transform:translate(0,0)}10%{transform:translate(-2%,-3%)}20%{transform:translate(3%,2%)}30%{transform:translate(-1%,4%)}40%{transform:translate(4%,-1%)}50%{transform:translate(-3%,3%)}60%{transform:translate(2%,-4%)}70%{transform:translate(-4%,1%)}80%{transform:translate(1%,-2%)}90%{transform:translate(-2%,4%)}}
#cur{position:fixed;width:8px;height:8px;background:var(--fg);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;}
#cur-ring{position:fixed;width:40px;height:40px;border:1px solid rgba(242,237,231,.25);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s;}
body.ch #cur-ring{width:60px;height:60px;}

.left{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:3rem;border-right:1px solid var(--border);position:relative;overflow:hidden;}
.left-logo{font-family:var(--display);font-size:1.1rem;font-weight:900;letter-spacing:.02em;color:var(--fg);text-decoration:none;text-transform:uppercase;opacity:0;}
.left-bg{position:absolute;bottom:-3rem;left:-2rem;font-family:var(--display);font-size:clamp(8rem,18vw,20rem);font-weight:900;letter-spacing:-.04em;color:transparent;-webkit-text-stroke:1px rgba(242,237,231,.04);pointer-events:none;user-select:none;line-height:1;opacity:0;}
.left-content{opacity:0;}
.left-tagline{font-family:var(--display);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:900;letter-spacing:-.04em;line-height:.95;margin-bottom:1.2rem;}
.left-sub{font-size:.85rem;color:var(--muted2);line-height:1.7;max-width:300px;font-weight:300;}
.left-footer{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);opacity:0;}

.right{width:480px;display:flex;flex-direction:column;justify-content:center;padding:4rem 3.5rem;overflow-y:auto;}
.form-eyebrow{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted2);margin-bottom:1.5rem;display:flex;align-items:center;gap:.7rem;opacity:0;}
.form-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--muted2);}
.form-title{font-family:var(--display);font-size:clamp(2rem,4vw,3rem);font-weight:900;letter-spacing:-.04em;line-height:.95;margin-bottom:.4rem;overflow:hidden;}
.form-title .line{overflow:hidden;display:block;}
.form-title .word{display:inline-block;transform:translateY(110%);}
.form-sub{font-size:.82rem;color:var(--muted2);margin-bottom:2.5rem;opacity:0;}
.err{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.2);padding:.7rem 1rem;font-size:.75rem;color:#fca5a5;margin-bottom:1.2rem;display:none;}
.field{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem;opacity:0;}
.field label{font-size:.6rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);}
.field-wrap{position:relative;}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:.8rem 1rem;color:var(--fg);font-size:.88rem;font-family:var(--font);outline:none;transition:border-color .2s;}
.field input:focus{border-color:rgba(242,237,231,.2);}
.field input::placeholder{color:var(--muted2);}
.pw-toggle{position:absolute;right:.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted2);cursor:pointer;font-size:.8rem;transition:color .2s;padding:.2rem;}
.pw-toggle:hover{color:var(--fg);}
.btn-submit{width:100%;padding:.9rem;font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--bg);background:var(--fg);border:none;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;opacity:0;}
.btn-submit:hover:not(:disabled){opacity:.88;}
.btn-submit:disabled{opacity:.35;cursor:not-allowed;}
.form-switch{margin-top:1.5rem;font-size:.75rem;color:var(--muted2);text-align:center;opacity:0;}
.form-switch a{color:var(--fg);text-decoration:none;font-weight:500;}
.form-switch a:hover{text-decoration:underline;}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:var(--muted2);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;opacity:0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

@media(max-width:768px){.left{display:none;}.right{width:100%;padding:3rem 2rem;}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-ring"></div>

<div class="left">
  <a href="home.html" class="left-logo">Eventix</a>
  <div class="left-content">
    <div class="left-tagline">Welcome<br>back.</div>
    <p class="left-sub">Atomic seat reservation. Zero overbooking. Every transaction guaranteed.</p>
  </div>
  <div class="left-footer">Eventix · 2025 · Built with concurrency</div>
  <div class="left-bg">EX</div>
</div>

<div class="right">
  <div class="form-eyebrow">Sign in</div>
  <h1 class="form-title">
    <span class="line"><span class="word">Good to see</span></span>
    <span class="line"><span class="word">you again.</span></span>
  </h1>
  <p class="form-sub">Enter your credentials to continue</p>
  <div class="err" id="err"></div>
  <form id="loginForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="hello@eventix.com" required autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="pw-toggle" id="pwToggle">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">→ Sign in</button>
  </form>
  <div class="divider">or</div>
  <p class="form-switch">Don't have an account? <a href="signup.html">Create one</a></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const API = 'http://localhost:3000/api';

// Cursor
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function lerp(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cur.style.left=mx+'px';cur.style.top=my+'px';ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp);})();
document.querySelectorAll('a,button,input').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});

// Entrance animations
const tl = gsap.timeline({ defaults:{ ease:'power3.out' } });
tl.to('.left-logo',    { opacity:1, y:0, duration:.6, delay:.1 })
  .to('.left-bg',      { opacity:1, duration:1.2, ease:'power2.out' }, .1)
  .to('.left-content', { opacity:1, y:0, duration:.7 }, .2)
  .to('.left-footer',  { opacity:1, duration:.5 }, .4)
  .to('.form-eyebrow', { opacity:1, y:0, duration:.5 }, .15)
  .to('.form-title .word', { y:0, duration:.8, stagger:.1 }, .25)
  .to('.form-sub',     { opacity:1, y:0, duration:.5 }, .45)
  .to('.field',        { opacity:1, y:0, duration:.4, stagger:.08 }, .5)
  .to('.btn-submit',   { opacity:1, y:0, duration:.4 }, .7)
  .to(['.divider','.form-switch'], { opacity:1, duration:.4, stagger:.05 }, .75);

// Password toggle
let shown=false;
document.getElementById('pwToggle').addEventListener('click',()=>{
  shown=!shown;
  document.getElementById('password').type=shown?'text':'password';
});

// Form submit
document.getElementById('loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=document.getElementById('submitBtn'),err=document.getElementById('err');
  err.style.display='none';
  btn.disabled=true;
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".3"/><path d="M21 12a9 9 0 00-9-9"/></svg> Signing in…`;
  try {
    const res=await fetch(`${API}/auth/login`,{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})});
    const data=await res.json();
    if(data.success){
      localStorage.setItem('user',JSON.stringify(data.data));
      gsap.to('body',{opacity:0,duration:.4,onComplete:()=>window.location.href=data.data.isAdmin?'admin.html':'currevents.html'});
    } else { err.textContent=data.error; err.style.display='block'; gsap.from(err,{x:-8,duration:.3,ease:'power2.out'}); }
  } catch(_){ err.textContent='Cannot reach server'; err.style.display='block'; }
  finally { btn.disabled=false; btn.innerHTML='→ Sign in'; }
});
</script>
</body>
</html>
