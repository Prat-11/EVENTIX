<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Events - Ticket Booking</title>
    <link rel="stylesheet" href="currevents.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Current Events</h1>
            <p>Discover and enroll in upcoming events</p>
            <button class="create-btn" id="createBtn">+ Create Event</button>
        </header>

        <!-- Create Event Form -->
        <div class="modal" id="createModal">
            <div class="modal-content">
                <span class="close" id="closeCreate">&times;</span>
                <h2>Create New Event</h2>
                <form id="createEventForm">
                    <div class="form-group">
                        <label>Your Name (Organizer)</label>
                        <input type="text" id="organizerName" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Event Name</label>
                        <input type="text" id="eventName" required placeholder="Enter event name">
                    </div>
                    <div class="form-group">
                        <label>Event Date</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label>Members Required</label>
                        <input type="number" id="membersRequired" required min="1" placeholder="Number of members">
                    </div>
                    <button type="submit" class="submit-btn">Create Event</button>
                </form>
            </div>
        </div>

        <!-- Enroll Modal -->
        <div class="modal" id="enrollModal">
            <div class="modal-content">
                <span class="close" id="closeEnroll">&times;</span>
                <h2>Enroll in Event</h2>
                <div id="enrollEventInfo"></div>
                <form id="enrollForm">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="userName" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" id="userEmail" required placeholder="Enter your email">
                    </div>
                    <button type="submit" class="submit-btn">Confirm Enrollment</button>
                </form>
            </div>
        </div>

        <!-- Events Grid -->
        <div class="events-grid" id="eventsGrid">
            <div class="loading">Loading events...</div>
        </div>
    </div>

    <script src="currevents.js"></script>
</body>
</html>
