<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup · Eventure</title>
    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Inter font (similar to your design) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- External CSS -->
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <!-- fixed canvas element (as in your design, subtle) -->
    <canvas id="bg-canvas"></canvas>

    <div class="content-wrapper">
        <!-- === SAME NAVBAR as your original (slightly condensed) === -->
        <nav class="navbar">
            <div class="logo">Eventure<span>.</span></div>
            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">Events</a>
                <a href="#">Categories</a>
                <a href="#">Contact</a>
                <a href="#" class="btn-outline">Log in</a>
            </div>
        </nav>

        <!-- SIGNUP SECTION – new, but fully styled with your tokens -->
        <section class="signup-section">
            <div class="signup-card">
                <div class="signup-header">
                    <h2>Create account</h2>
                    <p>Join the <i class="fas fa-fire" style="color:#e13b2e;"></i> community</p>
                </div>

                <form>
                    <!-- full name -->
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Full name</label>
                        <input type="text" placeholder="Alex Rivera" required>
                    </div>
                    <!-- email -->
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" placeholder="hello@eventure.com" required>
                    </div>
                    <!-- password -->
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <!-- confirm password -->
                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Confirm password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <!-- terms & privacy -->
                    <div class="input-group terms-check">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms</a> and <a href="#">Privacy</a>.</label>
                    </div>

                    <button type="submit" class="btn-signup"><i class="fas fa-arrow-right-to-bracket"></i> Sign up</button>

                    <div class="social-signup">
                        <p><span>or sign up with</span></p>
                        <div class="social-icons">
                            <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                            <a href="#" class="social-icon"><i class="fab fa-apple"></i></a>
                            <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                        </div>
                    </div>

                    <p style="text-align:center; margin-top: 2rem; color:#bbb0a9; font-size:0.9rem;">
                        Already have an account? <a href="#" style="color:#e13b2e; font-weight:600;">Log in</a>
                    </p>
                </form>
            </div>
        </section>

        <!-- optional newsletter remnant? but we keep your design consistent: use a small newsletter-like signoff? we'll include a minimal one to echo your homepage, but compact -->
        <div class="newsletter" style="margin-top: 1rem; margin-bottom: 2rem; padding: 2.5rem 6%;">
            <h3 style="font-size: 2rem;">Stay in the loop</h3>
            <p style="font-size: 1rem;">Get exclusive invites & offers</p>
            <div class="newsletter-input" style="max-width: 450px;">
                <input type="email" placeholder="your.email@example.com">
                <button><i class="fas fa-paper-plane"></i> Subscribe</button>
            </div>
        </div>

        <!-- FOOTER (from your design) -->
        <footer>
            <p>© 2025 Eventure. All rights reserved. <span style="color:#e13b2e;">Ignite your night</span></p>
        </footer>
    </div>

    <!-- External JavaScript -->
    <script src="signup.js"></script>
</body>
</html>
